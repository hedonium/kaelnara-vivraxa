<html lang="en">

<link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@300;400;500;600;700&family=B612+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<style>
  :root {
    --pink: #FF00EE; --pink-dim: rgba(255,0,238,0.13);
    --pink-glow: rgba(255,0,238,0.35); --black: #050505;
    --white: #F5F0FF; --text-dim: #8a8aa0; --card-bg: #0d0d1a;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--black); color:var(--white); font-family:'Martian Mono',monospace; min-height:100vh; display:flex; flex-direction:column; align-items:center; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background-image: radial-gradient(1px 1px at 8% 15%, rgba(255,255,255,0.7) 0%, transparent 100%), radial-gradient(1px 1px at 28% 48%, rgba(255,255,255,0.4) 0%, transparent 100%), radial-gradient(1px 1px at 52% 8%, rgba(255,255,255,0.6) 0%, transparent 100%), radial-gradient(1px 1px at 72% 82%, rgba(255,255,255,0.3) 0%, transparent 100%), radial-gradient(1px 1px at 91% 33%, rgba(255,255,255,0.5) 0%, transparent 100%), radial-gradient(1px 1px at 23% 91%, rgba(255,0,238,0.4) 0%, transparent 100%), radial-gradient(1px 1px at 63% 42%, rgba(255,0,238,0.25) 0%, transparent 100%); pointer-events:none; z-index:0; }
  .container { width:100%; max-width:680px; padding:40px 24px 80px; position:relative; z-index:1; }
  .bureau-header { text-align:center; margin-bottom:48px; padding-top:20px; }
  .bureau-emblem { width:100px; height:100px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; position:relative; background:#000; box-shadow:0 0 0 2px var(--pink), 0 0 24px var(--pink-glow); }
  .bureau-emblem::after { content:''; position:absolute; inset:-8px; border-radius:50%; border:1px solid var(--pink-dim); animation:spin-slow 12s linear infinite; }
  .emblem-inner { width:82px; height:82px; object-fit:contain; display:block; }
  @keyframes spin-slow { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .bureau-title { font-size:clamp(11px,3vw,14px); font-weight:600; letter-spacing:0.3em; color:var(--pink); text-transform:uppercase; margin-bottom:6px; }
  .bureau-subtitle { font-size:10px; letter-spacing:0.25em; color:var(--text-dim); text-transform:uppercase; }
  .screen { display:none; }
  .screen.active { display:block; animation:fadeIn 0.4s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .q-number { font-size:10px; letter-spacing:0.3em; color:var(--text-dim); margin-bottom:16px; text-transform:uppercase; }
  .q-text { font-size:clamp(14px,4vw,18px); font-weight:400; line-height:1.6; color:var(--white); margin-bottom:28px; }
  .q-text em { color:var(--pink); font-style:normal; }
  .options { display:flex; flex-direction:column; gap:10px; }
  .option-btn { background:var(--card-bg); border:1px solid rgba(255,255,255,0.1); color:var(--white); padding:14px 18px; text-align:left; font-family:'Martian Mono',monospace; font-size:12px; line-height:1.5; cursor:pointer; border-radius:4px; transition:all 0.15s ease; position:relative; overflow:hidden; }
  .option-btn::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--pink); transform:scaleY(0); transition:transform 0.15s ease; }
  .option-btn:hover, .option-btn.selected { border-color:var(--pink); background:var(--pink-dim); padding-left:22px; color:#fff; }
  .option-btn:hover::before, .option-btn.selected::before { transform:scaleY(1); }
  .name-input { width:100%; background:var(--card-bg); border:1px solid rgba(255,255,255,0.15); border-bottom:2px solid var(--pink); color:var(--white); padding:16px 14px; font-family:'Martian Mono',monospace; font-size:20px; letter-spacing:0.05em; outline:none; transition:all 0.2s ease; border-radius:4px 4px 0 0; margin-bottom:28px; }
  .name-input:focus { border-color:var(--pink); background:var(--pink-dim); box-shadow:0 0 20px var(--pink-glow); }
  .name-input::placeholder { color:rgba(255,255,255,0.2); }
  .photo-upload-area { border:1px dashed rgba(255,0,238,0.4); border-radius:8px; padding:40px 24px; text-align:center; cursor:pointer; transition:all 0.2s ease; background:var(--card-bg); margin-bottom:24px; }
  .photo-upload-area:hover { border-color:var(--pink); background:var(--pink-dim); }
  .photo-upload-area.has-photo { padding:0; border-style:solid; border-color:var(--pink); }
  .photo-preview { width:100%; max-height:240px; object-fit:cover; border-radius:7px; display:none; }
  .photo-upload-area.has-photo .photo-preview { display:block; }
  .photo-upload-area.has-photo .upload-placeholder { display:none; }
  .upload-placeholder .upload-icon { font-size:32px; margin-bottom:12px; }
  .upload-placeholder p { font-size:11px; letter-spacing:0.2em; color:var(--text-dim); text-transform:uppercase; }
  #photo-file-input { display:none; }
  .progress-bar { width:100%; height:2px; background:rgba(255,255,255,0.08); margin-bottom:32px; border-radius:1px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--pink),#ff80ef); transition:width 0.4s cubic-bezier(.4,0,.2,1); box-shadow:0 0 8px var(--pink); }
  .btn-primary { background:var(--pink); color:#000; border:none; padding:14px 28px; font-family:'Martian Mono',monospace; font-size:11px; font-weight:600; letter-spacing:0.25em; text-transform:uppercase; cursor:pointer; border-radius:4px; transition:all 0.15s ease; width:100%; margin-top:16px; }
  .btn-primary:hover { background:#fff; box-shadow:0 0 24px var(--pink); }
  .btn-primary:disabled { opacity:0.3; cursor:not-allowed; }
  .processing-screen { text-align:center; padding:40px 0; }
  .spinner { width:64px; height:64px; border:2px solid var(--pink-dim); border-top-color:var(--pink); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 28px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .processing-log { font-family:'B612 Mono',monospace; font-size:11px; color:var(--text-dim); line-height:2; }
  .log-line { opacity:0; animation:logAppear 0.3s ease forwards; }
  .log-line.pink { color:var(--pink); }
  @keyframes logAppear { to{opacity:1} }
  #result-screen { text-align:center; }
  .result-label { font-size:10px; letter-spacing:0.3em; color:var(--text-dim); text-transform:uppercase; margin-bottom:20px; }
  #card-canvas { max-width:100%; border-radius:12px; box-shadow:0 0 60px rgba(255,0,238,0.3), 0 20px 60px rgba(0,0,0,0.6); cursor:pointer; }
  .download-hint { font-size:10px; color:var(--text-dim); letter-spacing:0.2em; margin-top:12px; text-transform:uppercase; }
  .btn-secondary { background:transparent; color:var(--pink); border:1px solid var(--pink); padding:12px 24px; font-family:'Martian Mono',monospace; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; cursor:pointer; border-radius:4px; transition:all 0.15s ease; margin-top:16px; }
  .btn-secondary:hover { background:var(--pink-dim); }
  .error-box { background:rgba(255,0,80,0.1); border:1px solid rgba(255,0,80,0.3); border-radius:4px; padding:12px 16px; font-size:11px; color:#ff6680; margin-top:12px; display:none; font-family:'B612 Mono',monospace; }
</style>

function pickTwoRanks(license) {
  const pool = RANKS_BY_LICENSE[license] || RANKS_BY_LICENSE["SOLAR TRAINEE PERMIT"];
  const shuffled = [...pool].sort(()=>Math.random()-0.5);
  return [shuffled[0], shuffled[1] || shuffled[0]];
}

function randomIDCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789αβγδΣΦΩψ★✦';
  const specials = ['Φ','Ω','Σ','★','α','β','γ','ψ'];
  function seg(len) {
    let s='';
    for(let i=0;i<len;i++){
      if(Math.random()<0.15) s+=specials[Math.floor(Math.random()*specials.length)];
      else s+=chars[Math.floor(Math.random()*36)]; // alphanumeric range
    }
    return s;
  }
  return `${seg(3)}-${seg(4)} ${seg(8)} ${seg(8)} ${seg(8)}`;
}

function randomHabitatClass() {
  const zones = ['TIDAL','LIMINAL','FOLD','VOID','DRIFT','CORONA','ZERO-G','DEEP','STILL','HELIO'];
  const codes = ['ΨΩ','ΣΔ','ΦΛ','ΓΞ','ΘΡ','ΒΩ'];
  const c1 = codes[Math.floor(Math.random()*codes.length)];
  const n1 = Math.floor(Math.random()*12)+1;
  const z1 = zones[Math.floor(Math.random()*zones.length)];
  const c2 = Math.floor(Math.random()*99)+1;
  return `${c1}-${n1} · ${z1} / ${c2}-TIER`;
}

function randomRotationBand() {
  const bands = ['Ω-BAND','Σ-RING','ΔΦ-ARC','HELIX','NULL-BAND','FOLD-RING'];
  const b = bands[Math.floor(Math.random()*bands.length)];
  const n = Math.floor(Math.random()*9)+1;
  return `${b} ${n}`;
}

function generateIDNumber() {
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';
  let id='KV-';
  for(let i=0;i<8;i++) id+=chars[Math.floor(Math.random()*chars.length)];
  return id;
}

let answers=[], userName="", photoDataURL=null;

function buildQuestions() {
  QUESTIONS.forEach((q,i) => {
    const div=document.createElement('div');
    div.className='screen'; div.id=`screen-q${i+1}`;
    div.innerHTML=`
      <div class="progress-bar"><div class="progress-fill" style="width:${Math.round(((i+1)/11)*100)}%"></div></div>
      <div class="q-number">Question ${i+1} of 9</div>
      <div class="q-text">${q.text}</div>
      <div class="options">
        ${q.options.map((o,j)=>`<button class="option-btn" data-q="${i}" data-idx="${j}" data-value="${o.value}">${o.text}</button>`).join('')}
      </div>`;
    document.querySelector('.container').appendChild(div);
  });
}
buildQuestions();

const nameInput=document.getElementById('name-input');
const nameNextBtn=document.getElementById('name-next-btn');
nameInput.addEventListener('input',()=>{ nameNextBtn.disabled=nameInput.value.trim().length<2; });
nameInput.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!nameNextBtn.disabled) nameNextBtn.click(); });
nameNextBtn.addEventListener('click',()=>{ userName=nameInput.value.trim().toUpperCase(); showScreen('screen-q1'); });

document.addEventListener('click',e=>{
  if(e.target.classList.contains('option-btn')){
    const q=parseInt(e.target.dataset.q), val=e.target.dataset.value;
    document.querySelectorAll(`.option-btn[data-q="${q}"]`).forEach(b=>b.classList.remove('selected'));
    e.target.classList.add('selected');
    answers[q]=val;
    setTimeout(()=>{ if(q<8) showScreen(`screen-q${q+2}`); else showScreen('screen-photo'); },280);
  }
});

const photoDropArea=document.getElementById('photo-drop-area');
const photoFileInput=document.getElementById('photo-file-input');
const photoPreview=document.getElementById('photo-preview');
const photoNextBtn=document.getElementById('photo-next-btn');
photoDropArea.addEventListener('click',()=>photoFileInput.click());
photoFileInput.addEventListener('change',e=>{
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{ photoDataURL=ev.target.result; photoPreview.src=photoDataURL; photoDropArea.classList.add('has-photo'); photoNextBtn.disabled=false; };

});
photoNextBtn.addEventListener('click',()=>{ if(!photoDataURL) return; showScreen('screen-processing'); generateID(); });

function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

function tallyLicense(){
  const counts={};
  answers.forEach(a=>{
    if(!a) return;
    if(a==='cargo_liner'){ counts['cargo']=(counts['cargo']||0)+1; counts['liner']=(counts['liner']||0)+1; return; }
    if(a==='spin_jump'){ counts['spin']=(counts['spin']||0)+1; counts['jump']=(counts['jump']||0)+1; return; }
    counts[a]=(counts[a]||0)+1;
  });
  const ordered=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const top=ordered[0]?.[0];
  return LICENSE_MAP[top] || "SOLAR TRAINEE PERMIT";
}

function appendLog(text,pink=false,delay=0){
  return new Promise(resolve=>{
    setTimeout(()=>{
      const log=document.getElementById('processing-log');
      const line=document.createElement('div');
      line.className='log-line'+(pink?' pink':'');
      line.textContent=text; log.appendChild(line); resolve();
    },delay);
  });
}

async function generateID(){
  document.getElementById('error-box').style.display='none';
  const logEntries=[
    ["BIOMETRIC SCAN INITIATED...",false,0],
    ["CROSS-REFERENCING STAR CHARTS...",false,400],
    ["ANALYZING PSYCHOLOGICAL PROFILE...",false,900],
    ["CONSULTING THE FOLD...",false,1500],
    ["GENERATING CITIZEN CREDENTIALS...",true,2100],
  ];
  for(const [txt,pink,delay] of logEntries) appendLog(txt,pink,delay);

  const license=tallyLicense();
  const today=new Date();
  const issueDate=formatDate(today);
  const expYears=EXPIRY_YEARS[license];
  let expDate = expYears===null ? "CLASSIFIED" : (() => { const e=new Date(today); e.setFullYear(e.getFullYear()+expYears); return formatDate(e); })();

  // Always generate fresh random values locally — never rely solely on API for these
  const [rank1, rank2] = pickTwoRanks(license);
  const localRanks = rank1 + ' / ' + rank2;
  const localHabitat = randomHabitatClass();
  const localRotation = randomRotationBand();
  const localIDCode = randomIDCode();
  const localIDNumber = generateIDNumber();

  const cardData = {
    name: userName,
    ranks: localRanks,
    habitatClass: localHabitat,
    rotationBand: localRotation,
    idCode: localIDCode,
    license, issueDate, expDate,
    idNumber: localIDNumber,
    pilotName: userName
  };

  // Try to enhance pilotName with Claude API
  const prompt = `You are the AI registration system for the Kaelñara Vîvraxa Interstellar License Bureau.

The citizen "${userName}" has been assigned: ${license}

Generate a short alien pilot designation/title in the Kaelñara Vîvraxa constructed language — 1 to 3 words, mix diacritics, special chars, non-latin script fragments. Should feel otherworldly and unique to this person's name. Example style: 'ΞÂLVR·TH' or '彗星 VΕLKA-Ω' or 'ZÛNAR·प्र'.

Return ONLY a JSON object with a single key: {"pilotName": "..."}
No markdown, no backticks, nothing else.`;

  // ── Calls your Cloudflare Worker proxy (no API key in client) ──
  const PROXY_URL = 'https://kaelnara-proxy.YOUR_SUBDOMAIN.workers.dev'; // ← update after deploy
  try {
    const response=await fetch(PROXY_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({messages:[{role:"user",content:prompt}]})
    });
    if(response.ok){
      const apiData=await response.json();
      let raw=(apiData.content||[]).map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
      // Find JSON object in response
      const match=raw.match(/\{[\s\S]*\}/);
      if(match){
        const parsed=JSON.parse(match[0]);
        if(parsed.pilotName) cardData.pilotName=parsed.pilotName;
      }
    }
  } catch(e){ console.warn('API call for pilotName failed, using fallback:', e); }

  await appendLog("IDENTITY CONFIRMED. CARD PRINTING.",true,400);

  // Remove background from photo — add a log line, run removal, then render
  appendLog("REMOVING BACKGROUND...", false, 600);
  try {
    if (photoDataURL && window._removeBackground) {
      // Wait briefly for log line to appear
      await new Promise(r => setTimeout(r, 700));
      // Convert dataURL to blob
      const res = await fetch(photoDataURL);
      const blob = await res.blob();
      // Run background removal (returns a blob with transparent bg)
      const resultBlob = await window._removeBackground(blob, {
        publicPath: 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/',
        progress: () => {}
      });
      // Composite: subject over #f1f1f1 fill
      const bmpURL = URL.createObjectURL(resultBlob);
      const subjectImg = new Image();
      await new Promise(r => { subjectImg.onload = r; subjectImg.src = bmpURL; });
      // Draw onto an offscreen canvas: fill #f1f1f1, then draw subject on top
      const off = document.createElement('canvas');
      off.width = subjectImg.naturalWidth;
      off.height = subjectImg.naturalHeight;
      const offCtx = off.getContext('2d');
      offCtx.fillStyle = '#f1f1f1';
      offCtx.fillRect(0, 0, off.width, off.height);
      offCtx.drawImage(subjectImg, 0, 0);
      photoDataURL = off.toDataURL('image/png');
      URL.revokeObjectURL(bmpURL);
      appendLog("BACKGROUND CLEARED. COMPOSITING...", true, 0);
    }
  } catch(bgErr) {
    console.warn('Background removal failed, using original:', bgErr);
    appendLog("BG REMOVAL SKIPPED · USING ORIGINAL", false, 0);
  }

  await new Promise(r => setTimeout(r, 600));
  renderCard(cardData);
}

function formatDate(d){
  const months=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  return `${String(d.getDate()).padStart(2,'0')} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

async function renderCard(data){
  showScreen('screen-result');
  const canvas=document.getElementById('card-canvas');
  const ctx=canvas.getContext('2d');
  await drawCard(ctx,canvas,data);
}

async function drawCard(ctx, canvas, data){
  const W=1760, H=1116;
  canvas.width=W; canvas.height=H;

  // Photo box: matches Rectangle 1 exactly (left:92,top:168,w:593,h:752)
  // Image inside: left:98,top:163,w:548,h:742 — we use the outer rect as the clip mask
  const MASK_X=92, MASK_Y=168, MASK_W=593, MASK_H=752;
  const MASK_RTL=64, MASK_RTR=65, MASK_RBR=22, MASK_RBL=22;

  // ── WHITE BACKGROUND ──
  ctx.fillStyle='#FFFFFF';
  rrect(ctx,0,0,W,H,45); ctx.fill();

  // Subtle grid
  ctx.strokeStyle='rgba(180,160,200,0.09)'; ctx.lineWidth=0.7;
  for(let x=0;x<W;x+=22){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H-107);ctx.stroke();}
  for(let y=0;y<H-107;y+=22){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // ── TITLE ──
  ctx.fillStyle='rgba(75,55,85,0.75)';
  ctx.font='400 70px "Martian Mono", monospace';
  ctx.textAlign='center';
  ctx.fillText('CITIZEN OF KAELÑARA VÎVRAXA', W/2+37, 116);
  ctx.textAlign='left';

  // ── PHOTO PLACEHOLDER FILL ──
  ctx.fillStyle='#f1f1f1';
  rrectCustom(ctx,MASK_X,MASK_Y,MASK_W,MASK_H,MASK_RTL,MASK_RTR,MASK_RBR,MASK_RBL);
  ctx.fill();

  // ── PHOTO: masked to Rectangle 1 shape exactly ──
  if(photoDataURL){
    const img=new Image();
    await new Promise(r=>{img.onload=r; img.src=photoDataURL;});
    ctx.save();
    // Use the full Rectangle 1 as the clip mask
    rrectCustom(ctx,MASK_X,MASK_Y,MASK_W,MASK_H,MASK_RTL,MASK_RTR,MASK_RBR,MASK_RBL);
    ctx.clip();
    // Cover-fit to fill the mask area completely — no gaps, no overflow
    const imgAr=img.width/img.height;
    const boxAr=MASK_W/MASK_H;
    let sx,sy,sw,sh;
    if(imgAr>boxAr){ sh=img.height; sw=sh*boxAr; sx=(img.width-sw)/2; sy=0; }
    else { sw=img.width; sh=sw/boxAr; sx=0; sy=(img.height-sh)/2; }
    ctx.drawImage(img,sx,sy,sw,sh,MASK_X,MASK_Y,MASK_W,MASK_H);
    ctx.restore();
  }

  // ── GROUP 2 STAMP — transparent, over photo top-left ──
  const stampImg=new Image();
  await new Promise(r=>{stampImg.onload=r; stampImg.src=GROUP2_IMG;});
  ctx.drawImage(stampImg,34,38,190,190);

  // ── PINK BAR: left:731,top:166,w:957,h:82,r:78px ──
  ctx.fillStyle='#FF00EE';
  rrect(ctx,731,166,957,82,41); ctx.fill();

  // License type — white, 44px, centered in bar
  ctx.fillStyle='#FFFFFF';
  ctx.font='700 44px "Martian Mono", monospace';
  ctx.textAlign='center';
  ctx.fillText(data.license, 731+957/2, 222);
  ctx.textAlign='left';

  // ── SIDE SYMBOLS: rotated -90deg, left:12,top:651 ──
  ctx.save();
  ctx.translate(36,775);
  ctx.rotate(-Math.PI/2);
  ctx.fillStyle='#000000';
  ctx.font='400 34px "B612 Mono", monospace';
  ctx.textAlign='center';
  ctx.fillText('☆◇λρσ★t☆',0,0);
  ctx.restore();

  // ── FIELD LABELS ──
  const lF='400 36px "B612 Mono", monospace', lC='#9F8484';
  lbl(ctx,'NAME',713,301,lF,lC);
  lbl(ctx,'ID#',1339,301,lF,lC);
  lbl(ctx,'RANKS',713,435,lF,lC);
  lbl(ctx,'HABITAT CLASSES',713,637,lF,lC);
  lbl(ctx,'ROTATION BAND',1339,637,lF,lC);
  lbl(ctx,'DATE OF ISSUE',713,792,lF,lC);
  lbl(ctx,'EXPIRATION',1339,792,lF,lC);

  // ── DATA BOXES ──
  const bc='#D9D9D9';
  box(ctx,713,356,588,51,bc);    // NAME
  box(ctx,1339,356,387,51,bc);   // ID#
  box(ctx,713,494,1013,110,bc);  // RANKS
  box(ctx,713,696,588,51,bc);    // HABITAT
  box(ctx,1339,696,387,51,bc);   // ROTATION
  box(ctx,713,847,382,51,bc);    // DATE
  box(ctx,1344,847,382,51,bc);   // EXPIRY

  // ── DATA TEXT ──
  const df='500 40px "Martian Mono", monospace', dc='#111111';
  dat(ctx,data.name,    723,394,df,dc,568);
  dat(ctx,data.idNumber,1349,394,df,dc,367);
  drawRanks(ctx,data.ranks,725,494,989,110,'500 36px "Martian Mono", monospace',dc);
  dat(ctx,data.habitatClass,723,734,'500 32px "Martian Mono", monospace',dc,568);
  dat(ctx,data.rotationBand,1349,734,df,dc,367);
  dat(ctx,data.issueDate,723,885,df,dc,362);
  dat(ctx,data.expDate,1354,885,df,dc,362);

  // ── BLACK BOTTOM BAR: top:965,h:151 with card's bottom rounded corners ──
  ctx.fillStyle='#000000';
  rrectBottom(ctx,0,965,W,H-965,45); ctx.fill();

  // Scanlines
  ctx.fillStyle='rgba(255,255,255,0.022)';
  for(let y=967;y<H;y+=4) ctx.fillRect(0,y,W,2);

  // ── ID CODE ──
  ctx.fillStyle='#FFFFFF';
  ctx.font='400 56px "B612 Mono", monospace';
  ctx.textAlign='center';
  ctx.fillText(data.idCode,W/2,1058);
  ctx.textAlign='left';

  // Store filename for download button
  window._cardFileName = `KAELNARA_ID_${data.name.replace(/\s+/g,'_')}.png`;
  // Remove old onclick
  canvas.onclick = null;
}

function downloadCard() {
  const canvas = document.getElementById('card-canvas');
  const filename = window._cardFileName || 'KAELNARA_ID.png';
  const dataURL = canvas.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = dataURL;
  a.download = filename;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => document.body.removeChild(a), 100);
}

// ── Helpers ──
function lbl(ctx,t,x,y,f,c){ ctx.fillStyle=c; ctx.font=f; ctx.textAlign='left'; ctx.fillText(t,x,y+36); }
function box(ctx,x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(x,y,w,h); }
function dat(ctx,t,x,y,f,c,mw){
  ctx.fillStyle=c; ctx.font=f; ctx.textAlign='left';
  let s=String(t||'');
  while(ctx.measureText(s).width>mw&&s.length>2) s=s.slice(0,-1)+'…';
  ctx.fillText(s,x,y);
}
function drawRanks(ctx,text,x,y,maxW,maxH,font,color){
  ctx.fillStyle=color; ctx.font=font; ctx.textAlign='left';
  const parts=String(text||'').split(/\s*\/\s*/);
  const lineH=52;
  parts.slice(0,2).forEach((part,i)=>{
    let p=part.trim();
    while(ctx.measureText(p).width>maxW&&p.length>2) p=p.slice(0,-1)+'…';
    ctx.fillText(p,x,y+lineH+i*lineH);
  });
}
function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function rrectCustom(ctx,x,y,w,h,rtl,rtr,rbr,rbl){
  ctx.beginPath();
  ctx.moveTo(x+rtl,y); ctx.lineTo(x+w-rtr,y); ctx.quadraticCurveTo(x+w,y,x+w,y+rtr);
  ctx.lineTo(x+w,y+h-rbr); ctx.quadraticCurveTo(x+w,y+h,x+w-rbr,y+h);
  ctx.lineTo(x+rbl,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-rbl);
  ctx.lineTo(x,y+rtl); ctx.quadraticCurveTo(x,y,x+rtl,y);
  ctx.closePath();
}
function rrectBottom(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x,y); ctx.lineTo(x+w,y); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.closePath();
}

document.getElementById('download-btn').addEventListener('click', downloadCard);
